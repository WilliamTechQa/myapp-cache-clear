<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cache Manager</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="card">

    <h2>🧹 Cache Manager</h2>

    <button id="btn-server" class="btn-server">
      🧹 Servidor <br>
      <small>(Cache da aplicação)</small>
    </button>

    <button id="btn-reload" class="btn-reload">
      🔄 Reload <br>
      <small>(Cache do navegador)</small>
    </button>

    <button id="btn-bypass" class="btn-bypass">
      🚀 Bypass <br>
      <small>(Nova requisição)</small>
    </button>

    <button id="btn-full" class="btn-full">
      🧨 Completa <br>
      <small>(Limpeza total)</small>
    </button>

  </div>

  <script src="popup.js"></script>

</body>
</html>
